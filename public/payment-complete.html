<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Betaling fullført</title>
  <style>
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#ff7a00,#ffb000);
      color:#fff7ea;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
    }
    .card{
      width:min(560px,100%);
      background:rgba(78,36,0,.72);
      border:1px solid rgba(255,255,255,.14);
      border-radius:28px;
      padding:28px 22px;
      box-shadow:0 18px 40px rgba(70,25,0,.28);
      text-align:center;
    }
    h1{margin:0 0 12px}
    p{margin:0 0 12px;color:#f7dfbf}
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin-top:16px;
      padding:14px 18px;
      border-radius:18px;
      background:linear-gradient(135deg,#ffe27a,#ffbf3d);
      color:#3f1d00;
      text-decoration:none;
      font-weight:900;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Betaling registrert</h1>
    <p id="statusText">Oppdaterer ordrestatus ...</p>
    <a class="btn" href="/">Tilbake til forsiden</a>
  </div>

  <script>
    async function run() {
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get("orderId");
      const orderNumber = params.get("order");

      const statusText = document.getElementById("statusText");

      if (!orderId) {
        statusText.textContent = "Fant ikke ordre å oppdatere.";
        return;
      }

      try {
        const res = await fetch("/api/update-order-status", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            id: orderId,
            status: "paid"
          })
        });

        const data = await res.json();

        if (!res.ok) {
          statusText.textContent = data.error || "Kunne ikke oppdatere ordrestatus.";
          return;
        }

        statusText.textContent = orderNumber
          ? `Ordre #${orderNumber} er markert som betalt.`
          : "Ordren er markert som betalt.";
      } catch (err) {
        statusText.textContent = "Feil ved oppdatering av ordrestatus.";
      }
    }

    run();
  </script>
</body>
</html>
