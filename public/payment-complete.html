<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Betalingsstatus</title>

  <style>
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#ff7a00,#ffb000);
      color:#fff7ea;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
    }

    .card{
      width:min(560px,100%);
      background:rgba(78,36,0,.75);
      border-radius:28px;
      padding:28px 22px;
      text-align:center;
      box-shadow:0 18px 40px rgba(0,0,0,.3);
    }

    h1{
      margin:0 0 12px;
      font-size:28px;
    }

    p{
      margin:0 0 12px;
      color:#f7dfbf;
      font-size:16px;
    }

    .btn{
      display:inline-block;
      margin-top:16px;
      padding:14px 18px;
      border-radius:18px;
      background:linear-gradient(135deg,#ffe27a,#ffbf3d);
      color:#3f1d00;
      text-decoration:none;
      font-weight:900;
    }

    .success { color:#39d39f; }
    .error { color:#ff6b6b; }
    .pending { color:#ffd166; }
  </style>
</head>

<body>
  <div class="card">
    <h1 id="title">Sjekker betaling...</h1>
    <p id="statusText">Vent litt mens vi oppdaterer ordren.</p>
    <a class="btn" href="/">Tilbake til forsiden</a>
  </div>

  <script>
    async function fetchStatus(orderNumber) {
      const res = await fetch(`/api/get-order?order=${encodeURIComponent(orderNumber)}`);
      if (!res.ok) return null;
      return await res.json();
    }

    function showStatus(order, orderNumber) {
      const title = document.getElementById("title");
      const statusText = document.getElementById("statusText");

      if (order.status === "paid") {
        title.innerHTML = '<span class="success">Betaling godkjent</span>';
        statusText.textContent = `Ordre #${orderNumber} er registrert som betalt.`;
      } else if (order.status === "aborted") {
        title.innerHTML = '<span class="error">Betaling avbrutt</span>';
        statusText.textContent = `Ordre #${orderNumber} ble avbrutt og er ikke betalt.`;
      } else if (order.status === "delivered") {
        title.innerHTML = '<span class="success">Ordre utlevert</span>';
        statusText.textContent = `Ordre #${orderNumber} er allerede utlevert.`;
      } else {
        title.innerHTML = '<span class="pending">Venter på betaling</span>';
        statusText.textContent = `Ordre #${orderNumber} venter fortsatt på betaling.`;
      }
    }

    async function checkOrderStatus() {
      const params = new URLSearchParams(window.location.search);
      const orderNumber = params.get("order");

      const title = document.getElementById("title");
      const statusText = document.getElementById("statusText");

      if (!orderNumber) {
        title.textContent = "Fant ikke ordre";
        statusText.textContent = "Ordrenummer mangler i URL.";
        return;
      }

      try {
        // Prøv opptil 6 ganger med 1,5s mellomrom (totalt ~9s) mens vi venter på webhook
        for (let i = 0; i < 6; i++) {
          const order = await fetchStatus(orderNumber);

          if (!order) {
            title.textContent = "Ordre ikke funnet";
            statusText.textContent = `Fant ikke ordre #${orderNumber}.`;
            return;
          }

          if (order.status !== "pending_payment") {
            showStatus(order, orderNumber);
            return;
          }

          if (i < 5) {
            statusText.textContent = "Venter på bekreftelse fra Vipps...";
            await new Promise(r => setTimeout(r, 1500));
          }
        }

        // Etter alle forsøk, vis pending
        const order = await fetchStatus(orderNumber);
        if (order) showStatus(order, orderNumber);

      } catch (err) {
        title.textContent = "Feil";
        statusText.textContent = "Kunne ikke hente status.";
      }
    }

    checkOrderStatus();
  </script>
</body>
</html>
