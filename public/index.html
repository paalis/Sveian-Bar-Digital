<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sommerfest på Sveian</title>
  <style>
    :root{
      --bg-top:#ff7a00;
      --bg-bottom:#ffb000;

      --text:#fff7ea;
      --muted:#f7dfbf;
      --line:rgba(255,255,255,.14);

      --panel:rgba(78,36,0,.58);
      --panel-strong:rgba(66,28,0,.72);

      --yellow:#ffd166;
      --orange:#ff7a00;

      --shadow:0 18px 40px rgba(70,25,0,.28);
      --radius:24px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      min-height:100%;
    }

    body{
      margin:0;
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at 50% 12%, rgba(255,220,120,.28), transparent 20%),
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.08), transparent 18%),
        radial-gradient(circle at 80% 25%, rgba(255,255,255,.08), transparent 18%),
        linear-gradient(180deg, rgba(120,50,0,.18), rgba(80,30,0,.52)),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      background-attachment:fixed;
    }

    .app{
      max-width:1220px;
      margin:0 auto;
      padding:24px 14px 140px;
    }

    .topbar{
      position:sticky;
      top:10px;
      z-index:1000;
      margin-bottom:18px;
    }

    .brand{
      background:linear-gradient(180deg, rgba(255,170,40,.22), rgba(255,120,0,.18));
      border:1px solid rgba(255,255,255,.14);
      border-radius:34px;
      padding:26px 20px;
      box-shadow:0 18px 38px rgba(87,38,0,.24);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      text-align:center;
    }

    .top-logo{
      width:210px;
      max-width:78%;
      height:auto;
      display:block;
      margin:0 auto 18px auto;
      filter:drop-shadow(0 8px 18px rgba(94,38,0,.18));
    }

    .brand p{
      margin:0 auto;
      color:var(--text);
      line-height:1.28;
      font-size:clamp(1rem,2.2vw,1.2rem);
      max-width:760px;
      text-align:center;
    }

    .layout{
      display:grid;
      grid-template-columns:1.5fr .92fr;
      gap:16px;
      align-items:start;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:16px;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
    }

    .panel h2{
      margin:0 0 12px;
      font-size:1.18rem;
      color:var(--text);
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:14px;
    }

    .chip{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(80,36,0,.62);
      color:var(--text);
      border-radius:999px;
      padding:12px 16px;
      font-weight:800;
      cursor:pointer;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }

    .chip.active{
      background:linear-gradient(135deg,var(--yellow),#ffb63a);
      color:#3f1d00;
      border-color:transparent;
    }

    .search{
      width:100%;
      display:flex;
      align-items:center;
      gap:10px;
      padding:14px 16px;
      border-radius:20px;
      background:rgba(80,36,0,.62);
      border:1px solid rgba(255,255,255,.12);
      color:var(--text);
      margin-top:6px;
    }

    .search input{
      width:100%;
      border:0;
      background:transparent;
      color:var(--text);
      outline:none;
      font-size:1rem;
    }

    .search input::placeholder{
      color:var(--muted);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .card{
      position:relative;
      border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(180deg, rgba(86,39,0,.68), rgba(65,28,0,.74));
      border-radius:28px;
      padding:16px 14px;
      min-height:168px;
      text-align:left;
      color:inherit;
      cursor:pointer;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card:active{
      transform:scale(.985);
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.03), transparent 32%);
      pointer-events:none;
    }

    .badge{
      position:absolute;
      top:12px;
      right:12px;
      min-width:40px;
      height:40px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 12px;
      font-weight:900;
      background:linear-gradient(135deg,#ff5f8d,#ff8f6b);
      color:#fff;
      z-index:2;
    }

    .icon{
      font-size:2.2rem;
      line-height:1;
      margin:8px 0 14px;
      position:relative;
      z-index:1;
    }

    .name{
      font-size:1.02rem;
      font-weight:900;
      line-height:1.12;
      margin-bottom:6px;
      position:relative;
      z-index:1;
    }

    .meta{
      color:var(--muted);
      font-size:.9rem;
      margin-bottom:14px;
      position:relative;
      z-index:1;
    }

    .rowline{
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:10px;
      position:relative;
      z-index:1;
    }

    .price{
      color:var(--yellow);
      font-size:1.12rem;
      font-weight:900;
    }

    .tap{
      color:var(--muted);
      font-size:.82rem;
    }

    .order-list{
      display:grid;
      gap:10px;
      max-height:390px;
      overflow:auto;
      margin-bottom:14px;
    }

    .empty{
      padding:16px;
      border:1px dashed rgba(255,255,255,.16);
      border-radius:18px;
      color:var(--muted);
      background:rgba(255,255,255,.03);
    }

    .order-row{
      display:grid;
      grid-template-columns:42px 1fr auto;
      gap:10px;
      align-items:center;
      padding:12px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
    }

    .order-icon{
      font-size:1.5rem;
      text-align:center;
    }

    .order-name{
      font-weight:900;
      margin-bottom:4px;
    }

    .order-meta{
      color:var(--muted);
      font-size:.92rem;
    }

    .qty{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-top:8px;
    }

    .qty button,.actions button{
      border:0;
      cursor:pointer;
    }

    .qty button{
      width:34px;
      height:34px;
      border-radius:10px;
      background:rgba(255,255,255,.10);
      color:#fff;
      font-size:1.15rem;
      font-weight:900;
    }

    .line-total{
      font-weight:900;
      white-space:nowrap;
    }

    .summary{
      display:grid;
      gap:10px;
      padding:16px;
      border-radius:22px;
      background:linear-gradient(135deg, rgba(255,200,90,.18), rgba(255,122,0,.18));
      border:1px solid rgba(255,255,255,.12);
      margin-bottom:14px;
    }

    .sumrow{
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
    }

    .sumtotal{
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:12px;
      padding-top:10px;
      border-top:1px solid rgba(255,255,255,.12);
      font-weight:900;
    }

    .sumtotal strong{
      font-size:2rem;
      color:var(--yellow);
      line-height:1;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .actions button{
      border-radius:18px;
      padding:14px;
      font-size:1rem;
      font-weight:900;
      box-shadow:var(--shadow);
    }

    .ok{
      background:linear-gradient(135deg,#ffe27a,#ffbf3d);
      color:#3f1d00;
    }

    .blue{
      background:linear-gradient(135deg,#8a5ccf,#5a2f9a);
      color:#fff;
    }

    .pink{
      background:linear-gradient(135deg,#ff7a00,#ffb544);
      color:#3f1d00;
    }

    .orange{
      background:linear-gradient(135deg,#ff7a00,#ff9740);
      color:#3f1d00;
    }

    .hidden{
      display:none !important;
    }

    .sticky{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      padding:12px 14px calc(12px + env(safe-area-inset-bottom));
      background:linear-gradient(180deg, rgba(80,30,0,0), rgba(80,30,0,.14) 16%, rgba(80,30,0,.34) 35%, rgba(80,30,0,.52));
      z-index:1001;
    }

    .sticky-inner{
      max-width:1220px;
      margin:0 auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      background:rgba(78,36,0,.74);
      border:1px solid rgba(255,255,255,.14);
      border-radius:24px;
      padding:14px 16px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
    }

    .sticky-left{
      display:flex;
      gap:10px;
      align-items:center;
      color:var(--text);
      font-weight:900;
    }

    .sticky-total{
      color:var(--yellow);
      font-weight:900;
      font-size:1.15rem;
    }

    @media (max-width:1050px){
      .layout{grid-template-columns:1fr}
    }

    @media (max-width:560px){
      .app{
        padding:24px 14px 140px;
      }

      .topbar{
        top:8px;
      }

      .top-logo{
        width:190px;
      }

      .brand{
        border-radius:30px;
        padding:24px 18px;
      }

      .brand p{
        font-size:1rem;
      }

      .grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }

      .actions{
        grid-template-columns:1fr;
      }

      .card{
        min-height:164px;
      }

      .name{
        font-size:.98rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <img src="/logo.png" alt="Sommerfest på Sveian" class="top-logo">
        <p>Her kan du bestille dine forfriskninger på en enkel måte. Dette er beta nr 1 bestillingsskjerm.</p>
      </div>
    </div>

    <section id="view-bestill">
      <div id="customer-step-order" class="layout">
        <div class="panel">
          <div class="toolbar">
            <button class="chip active" data-cat="Alle">Alle</button>
            <button class="chip" data-cat="Billetter">Billetter</button>
            <button class="chip" data-cat="Merch">Merch</button>
            <button class="chip" data-cat="Drikke">Drikke</button>
            <button class="chip" data-cat="Mat">Mat</button>
            <button class="chip" data-cat="Snacks">Snacks</button>
            <button class="chip" data-cat="Tillegg">Tillegg</button>
            <label class="search"><span>🔎</span><input id="searchInput" type="text" placeholder="Søk etter vare..." /></label>
          </div>
          <div id="productGrid" class="grid"></div>
        </div>

        <aside class="panel">
          <h2>Din bestilling</h2>
          <div id="cartList" class="order-list"></div>

          <div class="summary">
            <div class="sumrow"><span>Antall enheter</span><strong id="cartUnits">0</strong></div>
            <div class="sumrow"><span>Ulike varer</span><strong id="cartUnique">0</strong></div>
            <div class="sumtotal"><span>Totalt</span><strong id="cartTotal">0 kr</strong></div>
          </div>

          <div class="actions">
            <button class="ok" id="placeOrderBtn" type="button">Bestill</button>
            <button class="blue" id="undoBtn" type="button">Trekk fra siste</button>
            <button class="pink" id="clearCartBtn" type="button">Nullstill</button>
            <button class="orange" id="demoBtn" type="button">Demoordre</button>
          </div>

          <p style="margin-top:12px;color:var(--muted);font-size:.92rem;">Trykk bestill for å gå til simulert betaling.</p>
        </aside>
      </div>
    </section>
  </div>

  <div class="sticky">
    <div class="sticky-inner">
      <div class="sticky-left"><span>🛒</span><span id="stickyCount">0 varer</span></div>
      <div class="sticky-total" id="stickyTotal">Totalt: 0 kr</div>
    </div>
  </div>

  <script>
    const products = [
      { id:"ticket", icon:"🎟️", name:"Inngangsbillett", price:475, category:"Billetter" },
      { id:"shirt", icon:"👕", name:"T-skjorte", price:200, category:"Merch" },
      { id:"glassfee", icon:"♻️", name:"Miljøavgift på glass", price:20, category:"Tillegg" },
      { id:"dahls", icon:"🍺", name:"Dahls pils", price:90, category:"Drikke" },
      { id:"juicyipa", icon:"🍻", name:"Frydenlund Juicy IPA", price:90, category:"Drikke" },
      { id:"fatol", icon:"🍺", name:"Frydenlund fatøl", price:90, category:"Drikke" },
      { id:"corona", icon:"🍺", name:"Corona", price:90, category:"Drikke" },
      { id:"glutenfri", icon:"🍺", name:"Grans glutenfri ØL", price:90, category:"Drikke" },
      { id:"smirnoff", icon:"🧊", name:"Smitnoff ICE", price:90, category:"Drikke" },
      { id:"breezer", icon:"🍹", name:"Breezer", price:90, category:"Drikke" },
      { id:"somersby", icon:"🍐", name:"Somersby Pære", price:90, category:"Drikke" },
      { id:"rodvin", icon:"🍷", name:"Rødvin", price:90, category:"Drikke" },
      { id:"hvitvin", icon:"🥂", name:"Hvitvin", price:90, category:"Drikke" },
      { id:"gingerjoe", icon:"🫚", name:"Ginger Joe", price:90, category:"Drikke" },
      { id:"shots", icon:"🥃", name:"Shots", price:50, category:"Drikke" },
      { id:"slush", icon:"🥤", name:"Slush", price:40, category:"Drikke" },
      { id:"brus", icon:"🥤", name:"Brus", price:35, category:"Drikke" },
      { id:"kaffe", icon:"☕", name:"Kaffe", price:25, category:"Drikke" },
      { id:"polse", icon:"🌭", name:"Pølse med brød", price:40, category:"Mat" },
      { id:"vaffel", icon:"🧇", name:"Hel plate vaffel", price:40, category:"Mat" },
      { id:"popcorn", icon:"🍿", name:"Popcorn", price:40, category:"Snacks" },
      { id:"potetgull", icon:"🥔", name:"Potetgull", price:30, category:"Snacks" },
      { id:"sukkerspinn", icon:"🍭", name:"Sukkerspinn", price:40, category:"Snacks" }
    ];

    let cart = {};
    let lastAdded = null;
    let activeCategory = "Alle";
    let searchText = "";

    function formatKr(v){
      return new Intl.NumberFormat("nb-NO").format(v) + " kr";
    }

    function getCartCount(id){
      return cart[id] || 0;
    }

    function addToCart(id){
      cart[id] = getCartCount(id) + 1;
      lastAdded = id;
      renderCustomer();
    }

    function changeCart(id, d){
      cart[id] = Math.max(0, getCartCount(id) + d);
      if (cart[id] === 0) delete cart[id];
      renderCustomer();
    }

    function clearCart(){
      cart = {};
      lastAdded = null;
      renderCustomer();
    }

    function undoLast(){
      if (!lastAdded || !getCartCount(lastAdded)) return;
      changeCart(lastAdded, -1);
    }

    function cartItems(){
      return products
        .filter(p => getCartCount(p.id) > 0)
        .map(p => ({
          ...p,
          qty: getCartCount(p.id),
          lineTotal: getCartCount(p.id) * p.price
        }));
    }

    function cartTotals(){
      const items = cartItems();
      return {
        units: items.reduce((s,i)=>s+i.qty,0),
        unique: items.length,
        total: items.reduce((s,i)=>s+i.lineTotal,0)
      };
    }

    function filteredProducts(){
      return products.filter(p => {
        const catOk = activeCategory === "Alle" || p.category === activeCategory;
        const q = searchText.trim().toLowerCase();
        const hay = (p.name + " " + p.category).toLowerCase();
        return catOk && (!q || hay.includes(q));
      });
    }

    async function placeOrder(){
      const items = cartItems();
      if (!items.length){
        alert("Velg minst én vare først.");
        return;
      }

      const totals = cartTotals();

      try {
        const res = await fetch("/api/create-payment", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            total: totals.total,
            items: items
          })
        });

        const data = await res.json();

        if (!res.ok) {
          alert((data.error || "Feil ved opprettelse av betaling.") + (data.details ? "\n\n" + JSON.stringify(data.details) : ""));
          return;
    }

        window.location.href = data.url;
      } catch (err) {
        alert("Klarte ikke å kontakte backend.");
      }
    }

    function renderCustomer(){
      const grid = document.getElementById("productGrid");
      grid.innerHTML = filteredProducts().map(p => `
        <button class="card" type="button" onclick="addToCart('${p.id}')">
          <div class="badge">${getCartCount(p.id)}</div>
          <div class="icon">${p.icon}</div>
          <div class="name">${p.name}</div>
          <div class="meta">${p.category}</div>
          <div class="rowline">
            <span class="price">${formatKr(p.price)}</span>
            <span class="tap">Trykk +1</span>
          </div>
        </button>
      `).join("");

      const items = cartItems();
      document.getElementById("cartList").innerHTML = items.length ? items.map(item => `
        <div class="order-row">
          <div class="order-icon">${item.icon}</div>
          <div>
            <div class="order-name">${item.name}</div>
            <div class="order-meta">${formatKr(item.price)} per stk</div>
            <div class="qty">
              <button type="button" onclick="changeCart('${item.id}',-1)">−</button>
              <strong>${item.qty}</strong>
              <button type="button" onclick="changeCart('${item.id}',1)">+</button>
            </div>
          </div>
          <div class="line-total">${formatKr(item.lineTotal)}</div>
        </div>
      `).join("") : `<div class="empty">Ingen varer valgt ennå.</div>`;

      const totals = cartTotals();
      document.getElementById("cartUnits").textContent = totals.units;
      document.getElementById("cartUnique").textContent = totals.unique;
      document.getElementById("cartTotal").textContent = formatKr(totals.total);
      document.getElementById("stickyCount").textContent = totals.units + " varer";
      document.getElementById("stickyTotal").textContent = "Totalt: " + formatKr(totals.total);
    }

    function demoOrder(){
      clearCart();
      addToCart("dahls");
      addToCart("dahls");
      addToCart("polse");
      addToCart("brus");
    }

    document.getElementById("searchInput").addEventListener("input", e => {
      searchText = e.target.value;
      renderCustomer();
    });

    document.querySelectorAll(".chip").forEach(btn => btn.addEventListener("click", () => {
      document.querySelectorAll(".chip").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeCategory = btn.dataset.cat;
      renderCustomer();
    }));

    document.getElementById("placeOrderBtn").addEventListener("click", placeOrder);
    document.getElementById("undoBtn").addEventListener("click", undoLast);
    document.getElementById("clearCartBtn").addEventListener("click", clearCart);
    document.getElementById("demoBtn").addEventListener("click", demoOrder);

    renderCustomer();
  </script>
</body>
</html>
