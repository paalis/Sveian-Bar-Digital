<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sveian Bestilling</title>

  <style>
    :root{
      --bg:#12131a;--text:#f7f2ea;--muted:#c9c4d8;--line:rgba(255,255,255,.08);
      --accent:#ff4fa3;--accent2:#ffd166;
      --green:#39d39f;--blue:#54bfff;--red:#ff6d8d;--orange:#ff9f4a;
      --shadow:0 18px 40px rgba(0,0,0,.28);--radius:24px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      color:var(--text);
      font-family:Inter,system-ui;
      background:linear-gradient(180deg,#220a2a,var(--bg));
    }

    .app{max-width:1000px;margin:0 auto;padding:20px}

    /* 🔥 LOGO */
    .logo-wrap{
      display:flex;
      justify-content:center;
      margin-bottom:20px;
    }

    .logo{
      width:160px;
      height:auto;
    }

    /* GRID */
    .layout{
      display:grid;
      grid-template-columns:1.4fr 1fr;
      gap:16px;
    }

    .panel{
      background:rgba(255,255,255,.05);
      border-radius:20px;
      padding:16px;
    }

    /* PRODUCTS */
    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }

    .card{
      background:#1c1d26;
      border-radius:16px;
      padding:14px;
      cursor:pointer;
    }

    .badge{
      float:right;
      background:var(--accent);
      padding:4px 8px;
      border-radius:999px;
    }

    /* CART */
    .order-row{
      display:flex;
      justify-content:space-between;
      margin-bottom:8px;
    }

    .actions button{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:none;
      font-weight:bold;
      margin-top:8px;
    }

    .ok{background:var(--green)}
    .blue{background:var(--blue)}
    .pink{background:var(--red)}

    .receipt{display:none}
    .receipt.show{display:block}

  </style>
</head>

<body>
<div class="app">

  <!-- 🔥 LOGO -->
  <div class="logo-wrap">
    <img src="/logo.png" class="logo" />
  </div>

  <!-- BESTILLING -->
  <div id="orderView" class="layout">

    <!-- PRODUKTER -->
    <div class="panel">
      <div id="productGrid" class="grid"></div>
    </div>

    <!-- HANDLEKURV -->
    <div class="panel">
      <h2>Din bestilling</h2>

      <div id="cartList"></div>

      <h3 id="cartTotal">0 kr</h3>

      <div class="actions">
        <button class="ok" onclick="placeOrder()">Bestill</button>
        <button class="blue" onclick="undo()">Angre</button>
        <button class="pink" onclick="clearCart()">Nullstill</button>
      </div>
    </div>

  </div>

  <!-- KVITTERING -->
  <div id="receiptView" class="receipt panel">
    <h2>Ordre registrert</h2>

    <p>Betal med Vipps</p>
    <h1 id="orderNo">#000</h1>

    <h3 id="receiptTotal"></h3>

    <button class="ok" onclick="newOrder()">Ny bestilling</button>
  </div>

</div>

<script>
const products = [
  {id:"beer", name:"🍺 Øl", price:90},
  {id:"wine", name:"🍷 Vin", price:90},
  {id:"shot", name:"🥃 Shot", price:50},
  {id:"soda", name:"🥤 Brus", price:35}
];

let cart = {};
let lastOrder = null;

function renderProducts(){
  document.getElementById("productGrid").innerHTML =
    products.map(p=>`
      <div class="card" onclick="add('${p.id}')">
        <div class="badge">${cart[p.id]||0}</div>
        ${p.name}<br>${p.price} kr
      </div>
    `).join("");
}

function add(id){
  cart[id]=(cart[id]||0)+1;
  render();
}

function undo(){
  const key=Object.keys(cart).pop();
  if(key) cart[key]--;
  if(cart[key]<=0) delete cart[key];
  render();
}

function clearCart(){
  cart={};
  render();
}

function render(){
  renderProducts();

  const items=Object.entries(cart);
  document.getElementById("cartList").innerHTML =
    items.map(([id,q])=>{
      const p=products.find(x=>x.id===id);
      return `<div class="order-row">${p.name} x${q}<span>${p.price*q} kr</span></div>`;
    }).join("");

  const total = items.reduce((s,[id,q])=>{
    const p=products.find(x=>x.id===id);
    return s+p.price*q;
  },0);

  document.getElementById("cartTotal").innerText = total+" kr";
}

async function placeOrder(){
  const items = Object.entries(cart).map(([id,q])=>{
    const p=products.find(x=>x.id===id);
    return {name:p.name, qty:q, price:p.price};
  });

  const total = items.reduce((s,i)=>s+i.qty*i.price,0);

  const res = await fetch("/api/create-payment",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({total,items})
  });

  const data = await res.json();

  lastOrder = data;

  document.getElementById("orderView").style.display="none";
  document.getElementById("receiptView").classList.add("show");

  document.getElementById("orderNo").innerText = "#"+data.orderNumber;
  document.getElementById("receiptTotal").innerText = total+" kr";

  cart={};
}

function newOrder(){
  document.getElementById("orderView").style.display="grid";
  document.getElementById("receiptView").classList.remove("show");
  render();
}

render();
</script>

</body>
</html>
