<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sveian Festival</title>

<style>
:root{
  --text:#fffaf0;
  --muted:#ffe0b3;
  --accent:#ff6a00;
  --accent2:#ffd166;
  --card:rgba(0,0,0,0.35);
  --line:rgba(255,255,255,0.15);
  --shadow:0 20px 50px rgba(0,0,0,.35);
  --radius:24px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui;
  color:var(--text);

  background:
    linear-gradient(180deg, rgba(255,140,0,0.25), rgba(60,20,0,0.9)),
    linear-gradient(135deg, #ff6a00, #ffcc33);
}

/* Layout */
.app{max-width:1200px;margin:auto;padding:16px}

/* HEADER */
.brand{
  background:linear-gradient(135deg, rgba(255,180,0,0.25), rgba(255,100,0,0.25));
  border-radius:28px;
  padding:20px;
  box-shadow:var(--shadow);
}

.brand img{
  width:140px;
  margin-bottom:10px;
}

.brand p{
  margin:0;
  color:var(--muted);
}

/* CHIP FILTER */
.toolbar{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.chip{
  border-radius:999px;
  padding:10px 14px;
  background:rgba(0,0,0,0.4);
  border:1px solid var(--line);
  color:var(--text);
  cursor:pointer;
  font-weight:700;
}

.chip.active{
  background:linear-gradient(135deg,#ffd166,#ff9f1c);
  color:#2b1200;
}

/* SEARCH */
.search{
  margin-top:10px;
  background:rgba(0,0,0,0.4);
  padding:12px;
  border-radius:16px;
}

.search input{
  width:100%;
  background:none;
  border:none;
  color:white;
  font-size:1rem;
  outline:none;
}

/* GRID */
.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:20px;
  padding:16px;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}

.icon{
  font-size:2rem;
  margin-bottom:10px;
}

.name{
  font-weight:800;
  font-size:1.1rem;
}

.meta{
  color:var(--muted);
  font-size:0.9rem;
}

.price{
  color:var(--accent2);
  font-weight:900;
  margin-top:6px;
}

/* BADGE */
.badge{
  position:absolute;
  right:10px;
  top:10px;
  background:linear-gradient(135deg,#ff4f7d,#ff9f4a);
  padding:6px 12px;
  border-radius:999px;
  font-weight:900;
}

/* STICKY */
.sticky{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  padding:12px;
}

.sticky-inner{
  background:rgba(0,0,0,0.6);
  border-radius:20px;
  padding:14px;
  display:flex;
  justify-content:space-between;
  box-shadow:var(--shadow);
}

.sticky-total{
  color:var(--accent2);
  font-weight:900;
}
</style>
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="brand">
    <img src="/logo.png" />
    <p>Her kan du bestille dine forfriskninger på en enkel måte. Dette er beta nr 1 bestillingsskjerm.</p>
  </div>

  <!-- FILTER -->
  <div class="toolbar">
    <button class="chip active">Alle</button>
    <button class="chip">Billetter</button>
    <button class="chip">Merch</button>
    <button class="chip">Drikke</button>
    <button class="chip">Mat</button>
    <button class="chip">Snacks</button>
  </div>

  <!-- SEARCH -->
  <div class="search">
    <input placeholder="🔎 Søk etter vare..." />
  </div>

  <!-- GRID -->
  <div class="grid">
    
    <div class="card">
      <div class="icon">🎟️</div>
      <div class="name">Inngangsbillett</div>
      <div class="meta">Billetter</div>
      <div class="price">475 kr</div>
    </div>

    <div class="card">
      <div class="icon">👕</div>
      <div class="name">T-skjorte</div>
      <div class="meta">Merch</div>
      <div class="price">200 kr</div>
    </div>

    <div class="card">
      <div class="icon">♻️</div>
      <div class="name">Miljøavgift</div>
      <div class="meta">Tillegg</div>
      <div class="price">20 kr</div>
    </div>

    <div class="card">
      <div class="icon">🍺</div>
      <div class="name">Dahls pils</div>
      <div class="meta">Drikke</div>
      <div class="price">90 kr</div>
    </div>

  </div>

</div>

<!-- STICKY -->
<div class="sticky">
  <div class="sticky-inner">
    <div>🛒 0 varer</div>
    <div class="sticky-total">Totalt: 0 kr</div>
  </div>
</div>

</body>
</html>
